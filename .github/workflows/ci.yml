name: CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────
  backend-lint-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff==0.11.6 pytest-cov==5.0.0

      - name: Lint with Ruff
        run: ruff check .

      - name: Run tests with baseline coverage gate
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=5

      - name: Backend import smoke check
        run: python -c "import app.main"

  # ── Frontend ─────────────────────────────────────────────
  frontend-lint-test:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (non-blocking baseline)
        continue-on-error: true
        run: npm run lint

      - name: Install coverage provider
        run: npm i --no-save @vitest/coverage-v8@4.1.4

      - name: Run tests with coverage gate
        run: npm run test -- --run --coverage.enabled --coverage.provider=v8 --coverage.reporter=text-summary --coverage.thresholds.lines=25 --coverage.thresholds.functions=20 --coverage.thresholds.statements=25 --coverage.thresholds.branches=10

      - name: Build
        run: npm run build
